image: haskell:9.8.4

variables:
  STACK_ROOT: "${CI_PROJECT_DIR}/.stack"

cache: &global_cache
  paths:
    - .stack
    - .stack-work

before_script:
  - stack config set system-ghc --global true

hlint:
  tags: ["GitlabResearch"]
  image: debian:stable
  before_script:
    - apt-get update -yqq
    - apt-get install -y curl
  stage: build
  script:
    - curl -sL https://raw.github.com/ndmitchell/hlint/master/misc/travis.sh | sh -s .
  cache:
    policy: pull
